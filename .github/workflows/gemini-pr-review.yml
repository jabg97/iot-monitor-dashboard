name: Gemini AI Code Review

on:
  pull_request_target:
    types: [labeled]
  issue_comment:
    types: [created]

jobs:
  gemini-review:
    name: AI Code Review
    runs-on: ubuntu-latest

    # For labeled PRs, only run if the label is 'ai-review'
    # For issue comments, only run if it's a PR comment containing '/review' or '@pr'
    if: |
      (github.event_name == 'pull_request_target' && github.event.label.name == 'ai-review') ||
      (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request != null &&
        (
          contains(github.event.comment.body, '/review') ||
          contains(github.event.comment.body, '@pr')
        )
      )

    permissions:
      pull-requests: write
      issues: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-generativeai requests

      - name: Run Gemini PR Review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
        run: |
          python .github/scripts/gemini_review.py
